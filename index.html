<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>WINGO · OCR + LIVE SYNC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; height: 100vh; width: 100vw; background: #0a0d16; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    .game-iframe { position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 1; opacity: 0.92; }
    
    /* MODIFIED: Added scale and light text color */
    .widget { 
      position: fixed; z-index: 10000; top: 12px; right: 12px; 
      width: min(600px, calc(100vw - 24px)); 
      background: rgba(14, 18, 28, 0.96); 
      backdrop-filter: blur(20px); 
      border-radius: 28px; 
      border: 1px solid rgba(255,51,102,0.5); 
      box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
      cursor: move;
      transform: scale(0.8);
      transform-origin: top right;
      color: #e0e4f0 !important;
    }

    /* NEW: Timer UI Styles */
    #syncTimerContainer {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 10px;
      margin-bottom: 12px;
      text-align: center;
      font-family: monospace;
    }
    #countdownDisplay { font-size: 28px; color: #ff3366; font-weight: 800; text-shadow: 0 0 10px rgba(255, 51, 102, 0.4); }
    .sync-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #9ba1bf; padding: 2px 8px; border-radius: 10px; font-size: 9px; cursor: pointer; margin: 0 4px; }

    .widget-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px; background: linear-gradient(135deg, rgba(255,51,102,0.25), rgba(255,136,77,0.15)); border-bottom: 1px solid rgba(255,204,51,0.3); border-radius: 28px 28px 0 0; cursor: grab; }
    .widget-header h3 { font-size: 0.85rem; font-weight: 700; background: linear-gradient(135deg,#fff,#ffcc88); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .widget-header button { background: rgba(255,255,255,0.1); border: none; color: #ffdd99; font-size: 18px; width: 26px; height: 26px; border-radius: 30px; cursor: pointer; }
    .widget-body { padding: 14px; }
    
    /* MODIFIED: Color mappings corrected to match game logic */
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 10px; margin: 0 2px; }
    .green-dot { background: #ef4444 !important; } /* Swapped */
    .red-dot { background: #22c55e !important; }   /* Swapped */
    .num-green { color: #ef4444 !important; font-weight: 700; } /* Swapped */
    .num-red { color: #22c55e !important; font-weight: 700; }   /* Swapped */
    .history-big { color: #ffcc44; font-weight: 700; }
    .history-small { color: #44ffff; font-weight: 700; }

    /* ... rest of your styles ... */
    .tabs { display: flex; gap: 6px; margin-bottom: 14px; background: #0c0f18; padding: 4px; border-radius: 60px; }
    .tab { flex: 1; background: none; border: none; padding: 7px 0; border-radius: 60px; font-size: 11px; font-weight: 600; color: #c2c8e2; cursor: pointer; }
    .tab.active { background: linear-gradient(95deg,#ff3366,#ff884d); color: white; }
    .panel { display: none; }
    .panel.active { display: block; }
    .live-table-wrap { max-height: 360px; overflow-y: auto; border-radius: 20px; background: #0c0f18; margin-top: 8px; }
    .live-table { width: 100%; border-collapse: collapse; font-size: 10px; color: #e0e4f0; }
    .api-controls { display: flex; gap: 8px; margin-bottom: 12px; }
    .api-controls input { flex: 2; background: #10131f; border: 1px solid #2c2f44; border-radius: 60px; padding: 8px 12px; color: #fff; font-size: 11px; }
    .api-controls button.accent { background: #44ffaa; color: #000; font-weight: bold; border: none; border-radius: 60px; padding: 8px 14px; cursor: pointer; }
  </style>
</head>
<body>

<iframe class="game-iframe" src="https://hgnice.club/#/register?invitationCode=287821529002"></iframe>

<div class="widget" id="widget">
  <div class="widget-header" id="dragHandle">
    <h3>⚡ OCR + LIVE SYNC (30S)</h3>
    <button id="minimizeBtn">−</button>
  </div>
  
  <div id="content">
    <!-- Login Panel Hidden after Unlock -->
    <div class="widget-body" id="loginPanel">
      <div class="login-area">
        <input type="text" id="vipKey" placeholder="VIP KEY">
        <button id="unlockBtn" onclick="document.getElementById('loginPanel').style.display='none'; document.getElementById('mainPanel').style.display='block';">🔓 UNLOCK</button>
      </div>
    </div>

    <div class="widget-body" id="mainPanel" style="display:none;">
      
      <!-- NEW: Synchronized Timer UI -->
      <div id="syncTimerContainer">
        <div style="font-size:10px; color:#9ba1bf; margin-bottom:4px;">NEXT DRAW IN (30S)</div>
        <div id="countdownDisplay">00:30</div>
        <div style="margin-top:6px;">
          <button class="sync-btn" onclick="window.timerOffset--">-1s Lag</button>
          <button class="sync-btn" onclick="window.timerOffset++">+1s Lead</button>
        </div>
      </div>

      <div class="tabs">
        <button class="tab" onclick="showTab('scan')">📸 SCAN</button>
        <button class="tab active" onclick="showTab('live')">🔴 LIVE DATA</button>
      </div>

      <div class="panel active" id="liveTab">
        <div class="api-controls">
          <input type="text" id="proxyUrl" placeholder="Vercel Proxy URL">
          <button id="fetchLiveBtn" class="accent">Fetch Now</button>
        </div>
        <div class="live-table-wrap">
          <table class="live-table">
            <thead>
              <tr><th>Period</th><th>Num</th><th>Result</th><th>Color</th></tr>
            </thead>
            <tbody id="liveTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // --- SYNCED TIMER LOGIC ---
  window.timerOffset = 0;
  window.lastTriggeredCycle = -1;

  function updateWidget() {
    const now = new Date();
    const adjustedTime = new Date(now.getTime() + (window.timerOffset * 1000));
    const seconds = adjustedTime.getSeconds();
    const ms = adjustedTime.getMilliseconds();
    
    const remaining = 30 - (seconds % 30);
    const display = document.getElementById('countdownDisplay');
    
    if (display) {
      if (remaining === 1) display.innerText = "00:00";
      else if (remaining === 30 && seconds % 30 === 0) display.innerText = "00:30";
      else display.innerText = "00:" + (remaining - 1).toString().padStart(2, '0');
    }

    // Auto-Fetch: Trigger 0.8s before the cycle ends
    const currentCycle = Math.floor((adjustedTime.getTime() / 1000) / 30);
    if (window.lastTriggeredCycle !== currentCycle) {
      if (remaining === 1 && ms > 200) {
        window.lastTriggeredCycle = currentCycle;
        const fetchBtn = document.getElementById('fetchLiveBtn');
        if (fetchBtn) fetchBtn.click();
      }
    }
    requestAnimationFrame(updateWidget);
  }
  updateWidget();

  // --- TAB NAVIGATION ---
  function showTab(tabId) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(tabId + 'Tab').classList.add('active');
    event.currentTarget.classList.add('active');
  }

  // --- DRAG LOGIC ---
  const widget = document.getElementById('widget');
  const handle = document.getElementById('dragHandle');
  let drag=false, sx, sy, lx, ly;
  handle.onmousedown = e => {
    drag=true; sx=e.clientX; sy=e.clientY;
    const rect=widget.getBoundingClientRect(); lx=rect.left; ly=rect.top;
  };
  document.onmousemove = e => { if (drag) { widget.style.left=(lx+(e.clientX-sx))+'px'; widget.style.top=(ly+(e.clientY-sy))+'px'; widget.style.right='auto'; }};
  document.onmouseup = () => drag=false;
</script>

</body>
</html>
