<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WINGO · REAL DATA PREDICTOR</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .wingo-widget {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 400px;
      background: rgba(10, 12, 22, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255, 100, 120, 0.5);
      z-index: 100000;
      font-family: 'Inter', system-ui, sans-serif;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      cursor: move;
    }

    .wingo-widget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: linear-gradient(135deg, #ff3366, #ff884d);
      border-radius: 20px 20px 0 0;
      color: white;
      font-weight: bold;
      cursor: grab;
    }

    .wingo-widget-header:active { cursor: grabbing; }

    .wingo-widget-controls button {
      background: rgba(0, 0, 0, 0.3);
      border: none;
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 12px;
      cursor: pointer;
      margin-left: 6px;
    }

    .wingo-widget-body { padding: 16px; }

    .wingo-timer-section {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
    }

    .wingo-label { font-size: 11px; color: #aaa; }
    .wingo-period-value, .wingo-timer-value { font-size: 18px; font-weight: bold; color: #ffcc44; }

    .wingo-prediction {
      background: linear-gradient(135deg, #1a1f2e, #0f1220);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      margin-bottom: 12px;
    }

    .wingo-prediction-result { font-size: 36px; font-weight: bold; }
    .wingo-prediction-number { font-size: 48px; font-weight: bold; font-family: monospace; margin-top: 8px; }

    .wingo-stats {
      display: flex;
      justify-content: space-around;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 12px;
    }

    .wingo-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .wingo-tab {
      flex: 1;
      padding: 8px;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .wingo-tab.active { background: #ff3366; }

    .wingo-tab-content { display: none; }
    .wingo-tab-content.active { display: block; }

    .wingo-table-wrapper {
      max-height: 300px;
      overflow-y: auto;
    }

    .wingo-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .wingo-table th, .wingo-table td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid #333;
    }

    .wingo-table th { background: #1a1f2e; color: #ffaa66; }

    .history-big { color: #ffcc44; }
    .history-small { color: #44ffff; }
    .num-green { color: #4ade80; }
    .num-red { color: #f87171; }
    .num-purple { color: #d8b4fe; }

    .dot-wrapper { display: inline-flex; gap: 3px; align-items: center; }
    .dot { width: 10px; height: 10px; border-radius: 10px; }
    .green-dot { background: #22c55e; }
    .red-dot { background: #ef4444; }
    .purple-dot { background: #c084fc; }

    .big-result { color: #ffcc44; }
    .small-result { color: #44ffff; }
  </style>
</head>
<body>
<div id="wingo-root"></div>

<script>
(function() {
  // ==========================================
  // INJECT WIDGET INTO THE GAME PAGE
  // ==========================================
  
  let liveHistory = [];
  let predictionHistory = [];
  let currentPrediction = null;
  let currentPredictedNumber = null;
  let lastPatternName = "analyzing";
  let lastConfidence = 0.7;
  let timerInterval = null;
  let lastFetchSecond = -1;
  let widgetElement = null;
  let isDragging = false;
  let dragStartX, dragStartY, widgetStartX, widgetStartY;

  // Helper functions
  function getDotHtml(num) {
    const n = parseInt(num);
    let dots = [];
    if (n === 5) dots = ['green-dot', 'purple-dot'];
    else if (n === 0) dots = ['red-dot', 'purple-dot'];
    else if ([1,3,7,9].includes(n)) dots = ['green-dot'];
    else if ([2,4,6,8].includes(n)) dots = ['red-dot'];
    if (dots.length === 0) return '<span class="dot" style="background:#aaa;"></span>';
    return `<div class="dot-wrapper">${dots.map(d => `<span class="dot ${d}"></span>`).join('')}</div>`;
  }

  function getNumberClass(num) {
    const n = parseInt(num);
    if ([1,3,7,9].includes(n)) return 'num-green';
    if ([2,4,6,8].includes(n)) return 'num-red';
    if (n === 5 || n === 0) return 'num-purple';
    return '';
  }

  function getNumberDisplayData(num) {
    if ([1,3,7,9].includes(num)) return { dotClass: "green-dot", dual: false, textClass: "num-green" };
    if ([2,4,6,8].includes(num)) return { dotClass: "red-dot", dual: false, textClass: "num-red" };
    if (num === 5) return { dotClass: "green-dot purple-dot", dual: true, textClass: "num-purple" };
    if (num === 0) return { dotClass: "red-dot purple-dot", dual: true, textClass: "num-purple" };
    return { dotClass: "", dual: false, textClass: "" };
  }

  function saveToLocalStorage() {
    localStorage.setItem('wingo_widget_history', JSON.stringify(liveHistory.slice(-300)));
    localStorage.setItem('wingo_widget_predictions', JSON.stringify(predictionHistory.slice(-200)));
  }

  function loadFromLocalStorage() {
    const saved = localStorage.getItem('wingo_widget_history');
    if (saved) try { liveHistory = JSON.parse(saved); } catch(e) {}
    const savedPred = localStorage.getItem('wingo_widget_predictions');
    if (savedPred) try { predictionHistory = JSON.parse(savedPred); } catch(e) {}
  }

  function renderLiveTable() {
    const tbody = document.getElementById('wingo-live-tbody');
    if (!tbody) return;
    if (!liveHistory.length) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px;">No data yet...</td></tr>';
      document.getElementById('wingo-total-count').innerText = '0';
      return;
    }
    let html = '';
    liveHistory.slice(0, 30).forEach(row => {
      html += `<tr>
        <td style="font-family:monospace;">${row.period}</td>
        <td class="${getNumberClass(row.number)}"><strong>${row.number}</strong></td>
        <td class="${row.result === 'BIG' ? 'history-big' : 'history-small'}">${row.result}</td>
        <td>${getDotHtml(row.number)}</span></td>
      </tr>`;
    });
    tbody.innerHTML = html;
    document.getElementById('wingo-total-count').innerText = liveHistory.length;
  }

  function renderHistoryTable() {
    const tbody = document.getElementById('wingo-history-tbody');
    if (!tbody) return;
    if (!predictionHistory.length) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px;">No predictions yet</td></tr>';
      return;
    }
    let html = '';
    predictionHistory.slice(0, 30).forEach(p => {
      html += `<tr>
        <td style="font-family:monospace;">${p.period}</td>
        <td class="${p.predictedResult === 'BIG' ? 'history-big' : 'history-small'}">${p.predictedResult}</td>
        <td class="${getNumberClass(p.predictedNumber)}"><strong>${p.predictedNumber}</strong></td>
        <td class="${p.actualResult === 'BIG' ? 'history-big' : 'history-small'}">${p.actualResult || 'pending'}</td>
        <td>${p.correct ? '✅' : '❌'}</td>
      </tr>`;
    });
    tbody.innerHTML = html;
    const statsDiv = document.getElementById('wingo-history-stats');
    if (statsDiv) {
      const correct = predictionHistory.filter(p => p.correct === true).length;
      statsDiv.innerHTML = `📜 PREDICTION HISTORY — ✅ ${correct}  |  ❌ ${predictionHistory.length - correct}  |  Total: ${predictionHistory.length}`;
    }
  }

  function getNextPeriod() {
    if (liveHistory.length === 0) return "----";
    let maxPeriod = liveHistory[0].period;
    let maxNum = -1;
    for (let h of liveHistory) {
      let match = h.period.match(/\d+$/);
      if (match) {
        let num = parseInt(match[0], 10);
        if (num > maxNum) { maxNum = num; maxPeriod = h.period; }
      }
    }
    const match = maxPeriod.match(/\d+$/);
    if (match) {
      let numStr = match[0];
      let nextNum = parseInt(numStr, 10) + 1;
      let nextNumStr = nextNum.toString();
      while (nextNumStr.length < numStr.length) nextNumStr = "0" + nextNumStr;
      return maxPeriod.slice(0, maxPeriod.length - numStr.length) + nextNumStr;
    }
    return maxPeriod + "+1";
  }

  function convertToAB(history) {
    return history.map(h => h.result === 'SMALL' ? 'A' : 'B');
  }

  function detectPattern(abSeq) {
    if (abSeq.length < 3) return { pattern: "Insufficient", next: 'B', confidence: 0.55 };
    const seqStr = abSeq.join('');
    if (/^(AB)+$/.test(seqStr) || /^(BA)+$/.test(seqStr)) {
      const next = seqStr[seqStr.length - 1] === 'A' ? 'B' : 'A';
      return { pattern: "Alternating (ABAB)", next, confidence: 0.78 };
    }
    if (/^(AABB)+$/.test(seqStr)) {
      const lastTwo = seqStr.slice(-2);
      if (lastTwo === 'AA') return { pattern: "2A2B (AABB)", next: 'B', confidence: 0.72 };
      if (lastTwo === 'BB') return { pattern: "2A2B (AABB)", next: 'A', confidence: 0.72 };
      return { pattern: "2A2B (AABB)", next: 'A', confidence: 0.65 };
    }
    if (/^A{5,}$/.test(seqStr)) return { pattern: "Long streak A", next: 'B', confidence: 0.85 };
    if (/^B{5,}$/.test(seqStr)) return { pattern: "Long streak B", next: 'A', confidence: 0.85 };
    const recent = abSeq.slice(0, 6);
    const aCount = recent.filter(c => c === 'A').length;
    const bCount = recent.length - aCount;
    const next = aCount > bCount ? 'B' : 'A';
    const conf = Math.max(aCount, bCount) / recent.length;
    return { pattern: "Weighted recency", next, confidence: conf };
  }

  function predictNumber(history, targetResult) {
    if (history.length === 0) return targetResult === 'BIG' ? 7 : 2;
    let scores = Array(10).fill(0);
    let totalWeight = 0;
    for (let i = 0; i < Math.min(history.length, 30); i++) {
      let weight = Math.pow(0.88, i);
      scores[history[i].number] += weight;
      totalWeight += weight;
    }
    if (history[0]) scores[history[0].number] *= 0.4;
    let candidates = targetResult === 'BIG' ? [5,6,7,8,9] : [0,1,2,3,4];
    let bestNum = candidates[0], bestScore = -1;
    for (let num of candidates) {
      if (scores[num] > bestScore) { bestScore = scores[num]; bestNum = num; }
    }
    return { number: bestNum, conf: bestScore / totalWeight };
  }

  function generatePrediction() {
    if (liveHistory.length === 0) {
      currentPrediction = 'BIG';
      currentPredictedNumber = 7;
      lastConfidence = 0.5;
      return;
    }
    const abSeq = convertToAB(liveHistory);
    const pattern = detectPattern(abSeq);
    const predictedResult = pattern.next === 'A' ? 'SMALL' : 'BIG';
    const numPred = predictNumber(liveHistory, predictedResult);
    currentPrediction = predictedResult;
    currentPredictedNumber = numPred.number;
    lastPatternName = pattern.pattern;
    lastConfidence = (pattern.confidence + numPred.conf) / 2;
  }

  function updateUI() {
    if (!currentPrediction) return;
    const bigCount = liveHistory.filter(r => r.result === 'BIG').length;
    const smallCount = liveHistory.length - bigCount;
    document.getElementById('wingo-big-count').innerText = bigCount;
    document.getElementById('wingo-small-count').innerText = smallCount;
    const confPercent = Math.floor(lastConfidence * 100);
    document.getElementById('wingo-confidence').innerText = `${confPercent}%`;
    document.getElementById('wingo-confidence-fill').style.width = `${confPercent}%`;

    const displayData = getNumberDisplayData(currentPredictedNumber);
    let dotHtml = '';
    if (displayData.dual) {
      dotHtml = `<div class="dual-dot-container" style="display:flex; gap:6px;">${displayData.dotClass.split(' ').map(c => `<div class="dual-dot ${c}" style="width:40px; height:40px; border-radius:40px;"></div>`).join('')}</div>`;
    } else if (displayData.dotClass) {
      dotHtml = `<div class="prediction-dot ${displayData.dotClass}" style="width:40px; height:40px; border-radius:40px;"></div>`;
    } else {
      dotHtml = `<div style="width:40px; height:40px; border-radius:40px; background:#aaa;"></div>`;
    }
    document.getElementById('wingo-prediction-result').innerHTML = currentPrediction === 'BIG' ? '<span class="big-result">🔴 BIG</span>' : '<span class="small-result">🟢 SMALL</span>';
    document.getElementById('wingo-prediction-number').innerHTML = `<div class="prediction-number ${displayData.textClass}" style="font-size:42px; font-weight:800;">${currentPredictedNumber}</div>`;
    document.getElementById('wingo-prediction-dot').innerHTML = dotHtml;
    document.getElementById('wingo-trend-name').innerHTML = `🎯 ${currentPrediction} · Predicted ${currentPredictedNumber}`;
    document.getElementById('wingo-trend-desc').innerHTML = `🧠 ${lastPatternName} | ${liveHistory.length} rounds | Last: ${liveHistory[0]?.result} ${liveHistory[0]?.number}`;
    document.getElementById('wingo-next-period').innerText = getNextPeriod();
  }

  function onNewData() {
    if (liveHistory.length > 0 && currentPrediction) {
      const latestRound = liveHistory[0];
      const existing = predictionHistory.find(p => p.period === latestRound.period);
      if (!existing) {
        predictionHistory.unshift({
          period: latestRound.period,
          predictedResult: currentPrediction,
          predictedNumber: currentPredictedNumber,
          actualResult: latestRound.result,
          actualNumber: latestRound.number,
          correct: (currentPrediction === latestRound.result)
        });
        saveToLocalStorage();
        renderHistoryTable();
      }
    }
    generatePrediction();
    updateUI();
  }

  // ==========================================
  // FETCH REAL DATA FROM GAME API (NO CORS)
  // ==========================================
  async function fetchGameData() {
    try {
      const ts = Date.now();
      const url = `https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json?ts=${ts}`;
      
      const response = await fetch(url, {
        credentials: 'include',
        headers: { 'Referer': 'https://hgnice.club/', 'Accept': 'application/json' }
      });
      
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      
      const data = await response.json();
      let list = data.data?.list || data.list || [];
      
      if (list.length === 0) throw new Error('No data');
      
      const newHistory = list.map(item => ({
        period: String(item.issueNumber || item.period || ''),
        number: parseInt(item.number || 0, 10),
        result: (item.number || 0) >= 5 ? 'BIG' : 'SMALL'
      })).filter(item => item.period);
      
      newHistory.sort((a, b) => b.period.localeCompare(a.period));
      
      const existingSet = new Set(liveHistory.map(h => h.period));
      let added = 0;
      for (const item of newHistory) {
        if (!existingSet.has(item.period)) {
          liveHistory.unshift(item);
          added++;
        }
      }
      
      if (added > 0) {
        liveHistory.sort((a, b) => b.period.localeCompare(a.period));
        saveToLocalStorage();
        renderLiveTable();
        onNewData();
      }
      
      document.getElementById('wingo-trend-desc').innerHTML = `✅ ${liveHistory.length} rounds | Last: ${liveHistory[0]?.result} ${liveHistory[0]?.number}`;
      
    } catch (error) {
      console.error('Fetch error:', error);
      document.getElementById('wingo-trend-desc').innerHTML = `⚠️ Error: ${error.message}. Make sure you're on hgnice.club!`;
    }
  }

  // Timer
  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      const now = new Date();
      const sec = now.getSeconds();
      const ms = now.getMilliseconds();
      let remaining = sec < 30 ? 30 - sec - (ms/1000) : 60 - sec - (ms/1000);
      if (remaining < 0) remaining = 0;
      const timerElem = document.getElementById('wingo-timer');
      if (timerElem) {
        timerElem.innerText = `${Math.ceil(remaining)}s`;
        timerElem.style.color = remaining <= 3 ? '#ff8866' : '#ffcc88';
      }
      if ((sec === 0 || sec === 30) && ms < 100) {
        if (lastFetchSecond !== sec) {
          lastFetchSecond = sec;
          fetchGameData();
        }
      } else {
        if (sec !== 0 && sec !== 30) lastFetchSecond = -1;
      }
    }, 100);
  }

  // ==========================================
  // CREATE WIDGET
  // ==========================================
  function createWidget() {
    if (document.getElementById('wingo-main-widget')) return;
    
    widgetElement = document.createElement('div');
    widgetElement.id = 'wingo-main-widget';
    widgetElement.className = 'wingo-widget';
    widgetElement.innerHTML = `
      <div class="wingo-widget-header" id="wingo-drag-handle">
        <span>⚡ WINGO · REAL DATA AI</span>
        <div class="wingo-widget-controls">
          <button id="wingo-minimize">−</button>
          <button id="wingo-close">✕</button>
        </div>
      </div>
      <div class="wingo-widget-body" id="wingo-widget-body">
        <div class="wingo-timer-section">
          <div><span class="wingo-label">Next Period:</span><br><span id="wingo-next-period" class="wingo-period-value">----</span></div>
          <div><span class="wingo-label">Round ends in:</span><br><span id="wingo-timer" class="wingo-timer-value">--s</span></div>
        </div>
        <div class="wingo-prediction">
          <div id="wingo-prediction-result" class="wingo-prediction-result">---</div>
          <div style="display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 8px;">
            <div id="wingo-prediction-dot"></div>
            <div id="wingo-prediction-number" class="wingo-prediction-number">--</div>
          </div>
        </div>
        <div class="wingo-stats">
          <div>🔴 BIG: <b id="wingo-big-count">0</b></div>
          <div>🟢 SMALL: <b id="wingo-small-count">0</b></div>
          <div>📊 CONF: <b id="wingo-confidence">0%</b></div>
        </div>
        <div class="wingo-tabs">
          <button class="wingo-tab active" data-tab="live">📡 LIVE DATA</button>
          <button class="wingo-tab" data-tab="history">📜 HISTORY</button>
        </div>
        <div class="wingo-tab-content active" id="wingo-live-tab">
          <div style="font-size:11px; margin-bottom:8px;">TOTAL ROUNDS: <b id="wingo-total-count">0</b></div>
          <div class="wingo-table-wrapper">
            <table class="wingo-table">
              <thead><tr><th>PERIOD</th><th>NUMBER</th><th>RESULT</th><th>PATTERN</th></tr></thead>
              <tbody id="wingo-live-tbody"><tr><td colspan="4">Loading...</td></tr></tbody>
            </table>
          </div>
        </div>
        <div class="wingo-tab-content" id="wingo-history-tab">
          <div id="wingo-history-stats" class="wingo-label" style="margin-bottom:8px;">📜 PREDICTION HISTORY</div>
          <div class="wingo-table-wrapper">
            <table class="wingo-table">
              <thead><tr><th>PERIOD</th><th>PREDICTED</th><th>NUMBER</th><th>ACTUAL</th><th>✅/❌</th></tr></thead>
              <tbody id="wingo-history-tbody"><tr><td colspan="5">No predictions yet</td></tr></tbody>
            </table>
          </div>
        </div>
        <div class="wingo-trend-card" style="background:rgba(0,0,0,0.3); border-radius:12px; padding:10px; margin-top:12px;">
          <div id="wingo-trend-name" style="font-weight:800; font-size:13px; color:#ffdfb0;">📊 ANALYZING...</div>
          <div id="wingo-trend-desc" style="font-size:10px; color:#cbd5ff; margin-top:4px;">Fetching game data...</div>
          <div class="confidence-bar" style="background:#252d4a; border-radius:40px; height:4px; width:100%; margin-top:8px;">
            <div id="wingo-confidence-fill" style="background:linear-gradient(90deg,#44ffaa,#ffcc44); width:0%; height:4px; border-radius:40px;"></div>
          </div>
        </div>
      </div>
    `;
    
    document.body.appendChild(widgetElement);
    
    // Drag functionality
    const dragHeader = document.getElementById('wingo-drag-handle');
    dragHeader.addEventListener('mousedown', (e) => {
      if (e.target.closest('button')) return;
      isDragging = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      const rect = widgetElement.getBoundingClientRect();
      widgetStartX = rect.left;
      widgetStartY = rect.top;
      e.preventDefault();
    });
    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      widgetElement.style.left = `${widgetStartX + (e.clientX - dragStartX)}px`;
      widgetElement.style.top = `${widgetStartY + (e.clientY - dragStartY)}px`;
      widgetElement.style.right = 'auto';
    });
    document.addEventListener('mouseup', () => { isDragging = false; });
    
    // Minimize
    document.getElementById('wingo-minimize').addEventListener('click', () => {
      const body = document.getElementById('wingo-widget-body');
      body.style.display = body.style.display === 'none' ? 'block' : 'none';
    });
    
    // Close
    document.getElementById('wingo-close').addEventListener('click', () => {
      widgetElement.remove();
      if (timerInterval) clearInterval(timerInterval);
    });
    
    // Tabs
    document.querySelectorAll('.wingo-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.wingo-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.wingo-tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`wingo-${tab.dataset.tab}-tab`).classList.add('active');
      });
    });
  }

  // ==========================================
  // INIT
  // ==========================================
  function init() {
    createWidget();
    loadFromLocalStorage();
    renderLiveTable();
    renderHistoryTable();
    generatePrediction();
    updateUI();
    fetchGameData();
    startTimer();
  }
  
  // Check if we're on hgnice.club
  if (window.location.hostname.includes('hgnice.club')) {
    init();
  } else {
    console.warn('Widget only works on hgnice.club');
  }
})();
</script>
</body>
</html>
